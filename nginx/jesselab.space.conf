# Apex (jesselab.space) — personal_web static portal.
# Wildcard catch-all (*.jesselab.space) lives in the legacy block from phase 1.3,
# which still owns default_server. nginx picks this block for jesselab.space because
# the exact server_name match beats the wildcard.

server {
    listen 80;
    listen [::]:80;
    server_name jesselab.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jesselab.space;

    ssl_certificate     /etc/letsencrypt/live/jesselab.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jesselab.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000" always;

    root /srv/web/home/site;
    index index.html;
    location / { try_files $uri $uri.html $uri/ =404; }
}
