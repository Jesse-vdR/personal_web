<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0b10">
  <title>profile — Jesse</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0b10'/%3E%3Ccircle cx='16' cy='16' r='5' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%237c3aed'/%3E%3Cstop offset='1' stop-color='%23f59e0b'/%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <p class="eyebrow"><span class="dot"></span>JESSE</p>
    <h1>profile</h1>
    <div id="auth" class="auth"></div>
  </header>

  <main>
    <section id="profile" class="profile" hidden>
      <h2 class="section-h">identity</h2>
      <div class="field">
        <label>display name</label>
        <p id="p-name" class="field-value">—</p>
      </div>
      <div class="field">
        <label>email</label>
        <p id="p-email" class="field-value">—</p>
      </div>
    </section>

    <section class="byok" hidden id="byok">
      <h2 class="section-h">api keys</h2>
      <p class="byok-help">Currently using shared keys — bring-your-own coming later.</p>
      <div class="field">
        <label for="k-openai">OpenAI API key</label>
        <input id="k-openai" type="password" placeholder="sk-…" disabled autocomplete="off">
      </div>
      <div class="field">
        <label for="k-anthropic">Anthropic API key</label>
        <input id="k-anthropic" type="password" placeholder="sk-ant-…" disabled autocomplete="off">
      </div>
    </section>

    <section class="actions" hidden id="actions">
      <button id="signout-page" class="signout">sign out</button>
      <a href="/" class="back-link">← home</a>
    </section>

    <section id="profile-loading" class="about">
      <p>loading…</p>
    </section>
  </main>

  <footer>
    <span id="year"></span> · <a href="https://github.com/Jesse-vdR">Jesse-vdR</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
