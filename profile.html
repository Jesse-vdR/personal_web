<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#110d0a">
  <title>profile — Jesse</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23110d0a'/%3E%3Ccircle cx='16' cy='16' r='5' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%2360a5fa'/%3E%3Cstop offset='1' stop-color='%23dc2626'/%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E">
  <link rel="stylesheet" href="/shell/shell.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="shell-page shell-page--narrow">

<!-- shell topbar — Shell.mount() replaces this element -->
<div id="jesse-topbar"></div>

<header class="shell-page-header">
  <p class="shell-page-header__eyebrow">jesselab</p>
  <h1 class="shell-page-header__title">profile</h1>
</header>

<main class="shell-page-content">

  <section id="profile" class="apex-profile" hidden>
    <h2 class="apex-section-h">identity</h2>
    <div class="apex-field">
      <label>display name</label>
      <p id="p-name" class="apex-field-value">—</p>
    </div>
    <div class="apex-field">
      <label>email</label>
      <p id="p-email" class="apex-field-value">—</p>
    </div>
  </section>

  <section class="apex-byok" hidden id="byok">
    <h2 class="apex-section-h">api keys</h2>
    <p class="apex-byok-help">Currently using shared keys — bring-your-own coming later.</p>
    <div class="apex-field">
      <label for="k-openai">OpenAI API key</label>
      <input id="k-openai" type="password" placeholder="sk-…" disabled autocomplete="off">
    </div>
    <div class="apex-field">
      <label for="k-anthropic">Anthropic API key</label>
      <input id="k-anthropic" type="password" placeholder="sk-ant-…" disabled autocomplete="off">
    </div>
  </section>

  <section class="apex-actions" hidden id="actions">
    <a href="/" class="apex-back-link">← home</a>
  </section>

  <section id="profile-loading" class="apex-about">
    <p>loading…</p>
  </section>

</main>

<footer class="apex-footer">
  <span id="year"></span> · <a href="https://github.com/Jesse-vdR">Jesse-vdR</a>
</footer>

<script type="module">
  import { Shell } from "/shell/shell.js";
  Shell.mount({ mode: "subapp", apiBase: "https://api.jesselab.space", homeUrl: "/" });
</script>
<script src="app.js"></script>

</body>
</html>
